<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Messenger App (Week 8)</title>

  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
	<link rel="icon" type="image/png" href="../../../favicon.png">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="rootstyle.css">

</head>
<body>
  <h1>Messenger</h1>

  <!--START BLOCK-->
  <div id="start-block" class="block">
    <p>Welcome to our Chatting-App! Login or Register to start:</p>
  </div>

  <!--LOGIN BLOCK-->
  <div id="login-block" class="block" style="display: none;">
    <input id="email" class="inpfield" placeholder="bici3@test.at" />
    <input id="password" class="inpfield" type="password" placeholder="Bici33" />
    <button id="login-btn" class="btn">Login</button>
    </div>

  <!--REGISTRATION BLOCK-->
  <div id="register-block" class="block" style="display: none;">
    <input id="name" class="inpfield" placeholder="name" />
    <input id="emailReg" class="inpfield" placeholder="email" />
    <input id="passwordReg" class="inpfield" type="password" />
    <input id="group" class="inpfield" placeholder="group id" />
    <button id="register-btn" class="btn">Register</button>
  </div>

  <!--DASHBOARD-->
  <div id="dashboard-block" class="block" style="display:none;">
    <!--USER LIST BLOCK-->
    <div id="users-block">
      <h2>Your friends!</h2>
      <ul id="users-list"></ul>
    </div>

    <!--CHAT WINDOW-->
    <div id="chat-block">
      <h2 id="chat-header"></h2>

      <!--Send form-->
      <form id="chat-form">
        <input type="text" id="chat-input" class="inpfield" placeholder="Type your message..." />
        <button type="submit" id="chat-btn" class="btn">Send</button>
      </form>

      <div id="chat-messages">
        <!-- Messages go here -->
      </div>
    </div>
  </div>

  <!--Buttons-->
  <div id="buttons">
    <button id="show-login-btn" class="btn">Login Page</button>
    <button id="show-register-btn" class="btn">Register Page</button>
  </div>

  <!-- If using a bundler or compiled TS, you'd reference something in dist/ -->
  <script type="module" src="../dist/main.js"></script>
</body>
</html>

<!--
/chat-app
├── /src
│   ├── ApiService.ts      // Handles API calls (login, register, get users, send message, etc.)
│   ├── ChatUI.ts          // Manages the frontend UI (DOM interactions)
│   ├── StateManager.ts    // Stores global state (token, user ID, etc.)
│   └── main.ts            // Main entry – orchestrates login, sending, loading conversation
├── /public
│   ├── index.html         // Basic layout
│   ├── styles.css         // Optional styling
├── tsconfig.json
└── package.json
-->
