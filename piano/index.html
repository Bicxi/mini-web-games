<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- FONTS -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Prata&display=swap" rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Piano</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="rootstyle.css">
    <link rel="stylesheet" href="style.css">
	<link rel="icon" type="image/png" href="../favicon.png">
</head>
<body>
    <button class="btn mt-4 mx-3" onclick="window.location.href='../index.html';">Home</button>
    <div class="container text-center my-5">
        <h1>Virtual Piano</h1>
        <div class="mt-3">
            <p class="mb-1">Choose a song to play:</p>
            <select id="songAuswahl" class="form-control w-50 mx-auto">
                <option value="song1.json">Alle meine Entchen</option>
                <option value="song2.json">Bruder Jakob</option>
                <option value="song3.json">Twinkle Twinkle</option>
                <option value="song4.json">schwarze Tasten jippie</option>
            </select>
        </div>
        <p class="my-3">Press the following keys to play the notes:</p>
        <div id="blackKeyboard" class="d-flex justify-content-center"> <!--BESCHRIFTUNG-->
            <div class="blackKeyboardButton">W</div>
            <div class="blackKeyboardButton">E</div>
            <div class="blackKeyboardButton"></div>
            <div class="blackKeyboardButton">U</div>
            <div class="blackKeyboardButton">I</div>
            <div class="blackKeyboardButton">O</div>
        </div>
        <div id="pianoBlackKeys" class="d-flex justify-content-center">
            <!-- black keys with IDs for JavaScript interaction -->
            <div class="blackKey" id="keyCis">c#</div>
            <div class="blackKey" id="keyDis">d#</div>
            <div class="blackKey" id="keyEis"></div>
            <div class="blackKey" id="keyFis">f#</div>
            <div class="blackKey" id="keyGis">g#</div>
            <div class="blackKey" id="keyAis">a#</div>
        </div>
        <div id="piano" class="d-flex justify-content-center">
            <!-- Piano keys with IDs for JavaScript interaction -->
            <div class="key" id="keyC">c</div>
            <div class="key" id="keyD">d</div>
            <div class="key" id="keyE">e</div>
            <div class="key" id="keyF">f</div>
            <div class="key" id="keyG">g</div>
            <div class="key" id="keyA">a</div>
            <div class="key" id="keyB">h</div>
        </div>
        <div id="keyboard" class="d-flex justify-content-center"> <!--BESCHRIFTUNG-->
            <div class="keyboardButton">A</div>
            <div class="keyboardButton">S</div>
            <div class="keyboardButton">D</div>
            <div class="keyboardButton">F</div>
            <div class="keyboardButton">J</div>
            <div class="keyboardButton">K</div>
            <div class="keyboardButton">L</div>
        </div>
        <div class="mt-4">
            <button id="playButton" class="btn btn-primary mx-2">Play</button>
            <button id="pauseButton" class="btn btn-primary mx-2">Pause</button>
            <button id="resetButton" class="btn btn-secondary mx-2">Reset</button>
        </div>
    </div>
    <script type="module" src="dist/script.js"></script>
</body>
</html>
