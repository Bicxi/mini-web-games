<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- FONTS -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Prata&display=swap" rel="stylesheet">

    <!-- SYMBOLS FONT AWESOME-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
	<link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="rootstyle.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button class="btn mb-0 mt-4 mx-4" onclick="window.location.href='../index.html';">Home</button>
    <div class="container-fluid mt-3 container text-center align-items-center">
        <div class="row">
            <!-- links -->
            <div class="col-md-6 text-center">
                <h1>MEMORY GAME</h1>
                <p>Find all matches!</p>
                <div id="game-board" class="row justify-content-center mt-4 mb-4">
                    <!-- Cards -->
                </div>
                <button id="newGame2" class="btn btn-primary mt-2 mb-3">New Game</button>
            </div>

            <!-- rechts -->
            <div class="col-md-6 text-center">
                <p id="moveMessage">0 Moves</p>
                <p id="matchesMessage">0 Matches</p>
                <p id="highscoreMessage">Highscore: 0</p>
                <hr>

                <label>Pairs:</label>
                <input id="pairInput" type="number" min="2" max="8" value="6" class="form-control w-25 mx-auto mb-3">

                <div id="difficulty">
                    <p>Difficulty:</p>
                    <button id="difEasy" class="btn mt-2">Easy</button>
                    <button id="difNormal" class="btn mt-2">Normal</button>
                    <button id="difHard" class="btn mt-2">Hard</button>
                </div>
                <hr>

                <div id="playerPanel" class="mt-3">
                    <h3 id="currentMode">Singleplayer Mode</h3>
                    <p id="currentPlayer">Turn: Player 1</p>
                    <p id="scoreP1">P1: 0</p>
                    <p id="scoreP2">P2: 0</p>

                    <button id="toggleMultiplayer" class="btn btn-secondary mt-2">Toggle Multiplayer</button>
                </div>

            </div>
        </div>
    </div>
    <!--Winnign message: pup up-->
    <div class="container text-center align-items-center">
        <div id="winningMessage">
            <h1>You won!</h1>
            <p class="mt-4" id="moveMessageFinal"></p>
            <p>Do you want to play another round?</p>
            <button id="newGame" class="btn btn-primary mt-4">New Game</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
